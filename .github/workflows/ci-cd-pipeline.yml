name: CI/CD Pipeline for DealFlow.ai

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop, staging ]
  workflow_dispatch:
    inputs:
      deploy_to_production:
        description: 'Deploy to production?'
        required: true
        type: boolean
        default: false

env:
  NODE_VERSION: 24.x
  STAGING_ENV: staging
  PRODUCTION_ENV: production
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECR_REPOSITORY_URI: 123456789012.dkr.ecr.us-east-1.amazonaws.com/dealflow-ai

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_ENVIRONMENT: ${{ env.STAGING_ENV }}

      - name: Run tests
        run: npm run test
        env:
          TEST_ENVIRONMENT: ${{ env.STAGING_ENV }}

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/test-results.json

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./

  build-and-push-to-ecr:
    name: Build and Push to Amazon ECR
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsECRRole
          role-session-name: GitHubActionsSession

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: dealflow-ai
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy-to-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push-to-ecr
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.dealflow.ai
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsDeployRole
          role-session-name: GitHubActionsDeploySession

      - name: Deploy to AWS ECS (from ECR)
        run: |
          echo "Deploying to staging environment with image from ECR: $ECR_REPOSITORY_URI:${{ github.sha }}"
          # Add actual ECS deployment commands here (e.g., aws ecs update-service)

      - name: Upload deployment logs
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-logs
          path: logs/deployment.log

  rollback-staging:
    name: Rollback Staging
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    if: failure()
    steps:
      - name: Rollback to last stable deployment
        run: echo "Rolling back staging to last stable deployment"
        # Add actual rollback logic here

  deploy-to-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    if: github.ref == 'refs/heads/main' && (github.event.inputs.deploy_to_production == 'true' || github.event_name == 'workflow_dispatch')
    environment:
      name: production
      url: https://dealflow.ai
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsDeployRole
          role-session-name: GitHubActionsDeploySession

      - name: Deploy to AWS ECS (from ECR)
        run: |
          echo "Deploying to production environment with image from ECR: $ECR_REPOSITORY_URI:${{ github.sha }}"
          # Add actual ECS deployment commands here (e.g., aws ecs update-service)

      - name: Upload deployment logs
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-logs
          path: logs/deployment.log

  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: deploy-to-production
    if: failure()
    steps:
      - name: Rollback to last stable deployment
        run: echo "Rolling back production to last stable deployment"
        # Add actual rollback logic here
