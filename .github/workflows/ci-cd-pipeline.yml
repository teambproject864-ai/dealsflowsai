name: CI/CD Pipeline for DealFlow.ai with Time Blocking

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop, staging ]
  workflow_dispatch:
    inputs:
      deploy_to_production:
        description: 'Deploy to production?'
        required: true
        type: boolean
        default: false

env:
  NODE_VERSION: 24.x
  STAGING_ENV: staging
  PRODUCTION_ENV: production
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  validate-blocked-times-config:
    name: Validate Blocked Times Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate blocked times config
        run: npm run validate-blocked-times

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: blocked-times-validation-report
          path: reports/blocked-times-validation.json

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: validate-blocked-times-config
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_ENVIRONMENT: ${{ env.STAGING_ENV }}

      - name: Run tests
        run: npm run test
        env:
          TEST_ENVIRONMENT: ${{ env.STAGING_ENV }}

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/test-results.json

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./

  deploy-to-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.dealflow.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for staging
        run: npm run build
        env:
          NEXT_PUBLIC_ENVIRONMENT: ${{ env.STAGING_ENV }}

      - name: Deploy to staging (example - Vercel)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod'

      - name: Verify time blocking in staging
        run: npm run verify-time-blocking
        env:
          VERIFY_ENVIRONMENT: ${{ env.STAGING_ENV }}
          VERIFY_URL: https://staging.dealflow.ai

      - name: Upload deployment logs
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-logs
          path: logs/deployment.log

  rollback-staging:
    name: Rollback Staging
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    if: failure()
    steps:
      - name: Rollback to last stable deployment
        run: echo "Rolling back staging to last stable deployment"
        # Add actual rollback logic here (e.g., Vercel, AWS, etc.)

  deploy-to-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    if: github.ref == 'refs/heads/main' && (github.event.inputs.deploy_to_production == 'true' || github.event_name == 'workflow_dispatch')
    environment:
      name: production
      url: https://dealflow.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          NEXT_PUBLIC_ENVIRONMENT: ${{ env.PRODUCTION_ENV }}

      - name: Deploy to production (example - Vercel)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod'

      - name: Verify time blocking in production
        run: npm run verify-time-blocking
        env:
          VERIFY_ENVIRONMENT: ${{ env.PRODUCTION_ENV }}
          VERIFY_URL: https://dealflow.ai

      - name: Upload deployment logs
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-logs
          path: logs/deployment.log

  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: deploy-to-production
    if: failure()
    steps:
      - name: Rollback to last stable deployment
        run: echo "Rolling back production to last stable deployment"
        # Add actual rollback logic here (e.g., Vercel, AWS, etc.)
